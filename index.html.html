  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --vault-bg:#050a12;
    --vault-panel:#0a1628;
    --vault-border:#0d2847;
    --vault-accent:#00d4ff;
    --vault-accent2:#7c3aed;
    --vault-green:#00ff88;
    --vault-red:#ff3366;
    --vault-amber:#ffaa00;
    --vault-text:#c8d8ff;
    --vault-muted:#4a6a9a;
    --vault-dim:#1a2d4a;

    background:var(--vault-bg);
    min-height:600px;
    border-radius:12px;
    overflow:hidden;
    position:relative;
    font-family:'Rajdhani',sans-serif;
    color:var(--vault-text);

  .scanlines{
    position:absolute;inset:0;pointer-events:none;z-index:0;

    position:absolute;inset:0;pointer-events:none;z-index:0;

      linear-gradient(rgba(0,212,255,0.04) 1px,transparent 1px),

  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  @keyframes glow{0%,100%{text-shadow:0 0 8px var(--vault-accent)}50%{text-shadow:0 0 24px var(--vault-accent),0 0 48px var(--vault-accent)}}
  @keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:none}}
  @keyframes barFill{from{width:0}to{width:var(--w)}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes ringPulse{0%{transform:scale(1);opacity:0.7}100%{transform:scale(1.6);opacity:0}}

  .vault-icon-wrap{
    position:relative;margin-bottom:2rem;
    animation:float 3s ease-in-out infinite;
  }
  .vault-ring{
    position:absolute;inset:-12px;border:1px solid rgba(0,212,255,0.4);
    border-radius:50%;animation:ringPulse 2s ease-out infinite;
  }
  .vault-ring2{
    position:absolute;inset:-24px;border:1px solid rgba(0,212,255,0.2);

  .vault-title{
    font-family:'Share Tech Mono',monospace;

  .vault-subtitle{

  .lock-panel{

  .attempt-dots{display:flex;gap:8px;justify-content:center;margin-top:1rem;}

  .status-bar{

  .modal-overlay{

  .modal-box{

  /* SCROLLBAR */
  .main-content::-webkit-scrollbar{width:4px;}

  /* MOBILE RESPONSIVE MEDIA QUERIES */
  @media (max-width: 768px) {
    .app-layout { flex-direction: column; }
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--vault-border); }

    .nav-item.active { border-left-color: transparent; border-bottom-color: var(--vault-accent); }
    .topbar { flex-direction: column; align-items: flex-start; gap: 1rem; }
    .topbar-right { width: 100%; justify-content: space-between; }
    .metrics-row { grid-template-columns: repeat(2, 1fr); }
    .table-header { flex-direction: column; align-items: stretch; gap: 1rem; }

  @media (max-width: 480px) {
    .metrics-row { grid-template-columns: 1fr; }
    .enc-row { grid-template-columns: 1fr; }
    .table-inner th, .table-inner td { white-space: nowrap; }

function caesar(text,shift){
  return text.split('').map(c=>{
    let code=c.charCodeAt(0);
    if(code>=33&&code<=126) return String.fromCharCode(33+(code-33+shift)%94);
    return c;
  }).join('');
}

function getStrength(pwd){
  let score=0;
  if(pwd.length>=8)score++;if(pwd.length>=12)score++;
  if(/[A-Z]/.test(pwd)&&/[a-z]/.test(pwd))score++;
  if(/[0-9]/.test(pwd))score++;
  if(/[^a-zA-Z0-9]/.test(pwd))score++;
  return score<=2?'Weak':score<=3?'Medium':'Strong';
}

    ];
    return `
    <div class="app-layout" style="position:relative;">
      <div class="sidebar">
        <div class="sidebar-logo">
          <div class="logo-icon"><i class="ti ti-shield-lock" aria-hidden="true"></i></div>
          <div class="logo-text">VAULT</div>
        </div>
        <div class="nav-section">
          <div class="nav-label">Navigation</div>
          ${navItems.map(n=>`
          <div class="nav-item ${activeNav===n.id?'active':''}" data-nav="${n.id}">
            <i class="ti ${n.icon} ni" aria-hidden="true"></i>${n.label}
          </div>`).join('')}
        </div>
        <div class="sidebar-footer">
          <button class="lock-btn" id="lockBtn"><i class="ti ti-lock" aria-hidden="true"></i> Lock Vault</button>
        </div>
      </div>

      <div class="main-panel">
        <div class="topbar">
          <div class="topbar-left">
            <div class="page-title">${activeNav==='vault'?'Password Vault':activeNav==='add'?'Add New Entry':'Encryption Demo'}</div>
            ${activeNav==='vault'?`<div class="page-badge">${entries.length} ENTRIES</div>`:''}
          </div>
          <div class="topbar-right">
            <div class="stats-chip"><span class="stats-num">${strengthCount('Strong')}</span> strong</div>
            <div class="stats-chip"><span class="stats-num" style="color:var(--vault-amber)">${strengthCount('Weak')}</span> weak</div>
          </div>
        </div>

        <div class="main-content">
          ${activeNav==='vault'?vaultView():activeNav==='add'?addView():encView()}
        </div>
      </div>

      ${modalMode?modalHTML():''}
      <div id="toastArea" style="position:absolute;top:1rem;right:1rem;z-index:20;"></div>
    </div>`;
  }
};

function vaultView(){
  return `
  <div class="metrics-row">
    <div class="metric-card mc-cyan">
      <div class="metric-icon" style="color:var(--vault-accent)"><i class="ti ti-database" aria-hidden="true"></i></div>
      <div class="metric-val">${entries.length}</div>
      <div class="metric-label">Total Entries</div>
    </div>
    <div class="metric-card mc-green">
      <div class="metric-icon" style="color:var(--vault-green)"><i class="ti ti-shield-check" aria-hidden="true"></i></div>
      <div class="metric-val">${entries.filter(e=>e.strength==='Strong').length}</div>
      <div class="metric-label">Strong Passwords</div>
    </div>
    <div class="metric-card mc-amber">
      <div class="metric-icon" style="color:var(--vault-amber)"><i class="ti ti-alert-triangle" aria-hidden="true"></i></div>
      <div class="metric-val">${entries.filter(e=>e.strength==='Weak').length}</div>
      <div class="metric-label">Weak Passwords</div>
    </div>
    <div class="metric-card mc-purple">
      <div class="metric-icon" style="color:var(--vault-accent2)"><i class="ti ti-lock" aria-hidden="true"></i></div>
      <div class="metric-val">AES</div>
      <div class="metric-label">Encryption</div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <div class="table-title"><i class="ti ti-list" aria-hidden="true"></i> Saved Passwords</div>
      <input class="search-input" id="searchIn" placeholder="Search sites..." oninput="filterTable(this.value)">
    </div>
    <div id="tableBody">
      ${tableHTML(entries)}
    </div>
  </div>`;
}

function tableHTML(data){
  if(!data.length)return`<div style="padding:2rem;text-align:center;color:var(--vault-muted);font-size:14px;letter-spacing:1px;">NO ENTRIES FOUND</div>`;
  return`<table class="table-inner" role="table">
    <thead>
      <tr>
        <th>Site</th><th>Username</th><th>Password</th><th>Strength</th><th>Added</th><th>Actions</th>
      </tr>
    </thead>
    <tbody>
      ${data.map(e=>`
      <tr>
        <td>
          <div class="site-cell">
            <div class="site-avatar" style="background:${e.color}22;color:${e.color};border:1px solid ${e.color}44">${e.letter}</div>
            <div>
              <div class="site-name">${e.site}</div>
              <div class="site-url">${e.url}</div>
            </div>
          </div>
        </td>
        <td class="username-cell">${e.user}</td>
        <td>
          <div class="pwd-cell">
            <span class="pwd-mask" id="pwd-${e.id}">${visible[e.id]?e.pwd:'••••••••'}</span>
            <button class="eye-btn" onclick="toggleVis(${e.id})" aria-label="${visible[e.id]?'Hide':'Show'} password">
              <i class="ti ${visible[e.id]?'ti-eye-off':'ti-eye'}" aria-hidden="true"></i>
            </button>
          </div>
        </td>
        <td>
          <span class="strength-badge ${e.strength==='Strong'?'sb-strong':e.strength==='Medium'?'sb-medium':'sb-weak'}">
            ${e.strength}
          </span>
        </td>
        <td style="font-size:12px;color:var(--vault-muted);font-family:'Share Tech Mono',monospace">2026/06/06</td>
        <td>
          <div class="action-btns">
            <button class="icon-btn" onclick="openEdit(${e.id})" aria-label="Edit ${e.site}"><i class="ti ti-edit" aria-hidden="true"></i></button>
            <button class="icon-btn del" onclick="deleteEntry(${e.id})" aria-label="Delete ${e.site}"><i class="ti ti-trash" aria-hidden="true"></i></button>
          </div>
        </td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

function addView(){
  return`
  <div style="max-width:480px;">
    <div class="table-wrap" style="overflow:visible;">
      <div class="table-header"><div class="table-title"><i class="ti ti-plus" aria-hidden="true"></i> New Password Entry</div></div>
      <div style="padding:1.5rem;">
        <div class="form-row">
          <label class="form-label">Website / App Name</label>
          <input class="form-field" id="newSite" placeholder="e.g. GitHub">
        </div>
        <div class="form-row">
          <label class="form-label">Website URL</label>
          <input class="form-field" id="newUrl" placeholder="e.g. github.com">
        </div>
        <div class="form-row">
          <label class="form-label">Username / Email</label>
          <input class="form-field" id="newUser" placeholder="e.g. user@email.com">
        </div>
        <div class="form-row">
          <label class="form-label">Password</label>
          <input class="form-field" id="newPwd" type="text" placeholder="Enter password" oninput="updateStrengthMeter(this.value)">
          <div class="strength-meter">
            <div class="sm-bar" id="sm1"></div>
            <div class="sm-bar" id="sm2"></div>
            <div class="sm-bar" id="sm3"></div>
            <div class="sm-bar" id="sm4"></div>
            <div class="sm-bar" id="sm5"></div>
          </div>
        </div>
        <button class="btn-primary" onclick="addEntry()" style="margin-top:0.5rem;">
          <i class="ti ti-shield-plus" aria-hidden="true"></i>  Save to Vault
        </button>
      </div>
    </div>
  </div>`;
}

function encView(){
  return`
  <div style="max-width:520px;">
    <div class="table-wrap" style="overflow:visible;">
      <div class="table-header"><div class="table-title"><i class="ti ti-lock" aria-hidden="true"></i> Caesar Cipher — Shift 7</div></div>
      <div style="padding:1.5rem;">
        <div class="form-row">
          <label class="form-label">Input Text</label>
          <input class="form-field" id="encInput" placeholder="Type anything..." oninput="runEnc(this.value)">
        </div>
        <div style="margin-bottom:1rem;">
          <div class="enc-label">Encrypted Output</div>
          <div class="enc-strip" id="encOut">—</div>
        </div>
        <div>
          <div class="enc-label">Decrypted (verification)</div>
          <div class="enc-strip" id="decOut" style="color:var(--vault-green)">—</div>
        </div>
        <div style="margin-top:1.5rem;padding:1rem;background:var(--vault-bg);border:1px solid var(--vault-border);border-radius:6px;">
          <div style="font-size:11px;letter-spacing:2px;color:var(--vault-muted);text-transform:uppercase;margin-bottom:8px;">About Encryption</div>
          <div style="font-size:14px;color:var(--vault-text);line-height:1.6;">
            Passwords are stored with Caesar Cipher (shift 7). Each character is shifted in ASCII space. Decryption reverses the shift to display original passwords in the vault.
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function modalHTML(){
  const e=entries.find(x=>x.id===editId)||{};
  return`
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal-box">
      <div class="modal-top">
        <div class="modal-title"><i class="ti ti-edit" aria-hidden="true"></i> Edit Entry</div>
        <button class="close-btn" onclick="closeModal()" aria-label="Close modal"><i class="ti ti-x" aria-hidden="true"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label class="form-label">Website</label>
          <input class="form-field" id="mSite" value="${e.site||''}">
        </div>
        <div class="form-row">
          <label class="form-label">Username</label>
          <input class="form-field" id="mUser" value="${e.user||''}">
        </div>
        <div class="form-row">
          <label class="form-label">New Password</label>
          <input class="form-field" id="mPwd" type="text" value="${e.pwd||''}">
        </div>
        <button class="btn-primary" onclick="saveEdit()">
          <i class="ti ti-check" aria-hidden="true"></i>  Save Changes
        </button>
      </div>
    </div>
  </div>`;
}

function attachEvents(){
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click',()=>{
      activeNav=el.dataset.nav;
      modalMode=null;
      render();
    });
  });
  const lb=document.getElementById('lockBtn');
  if(lb)lb.addEventListener('click',()=>{activeScreen='lock';attempts=3;render();});
  const ub=document.getElementById('unlockBtn');
  if(ub)ub.addEventListener('click',tryUnlock);
  const pi=document.getElementById('passIn');
  if(pi)pi.addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock();});
}

function tryUnlock(){
  const p=document.getElementById('passIn').value;
  if(p==='admin123'){activeScreen='main';activeNav='vault';render();}
  else{
    attempts=Math.max(0,attempts-1);
    if(attempts===0){showToastOverlay('Too many failed attempts','error');attempts=3;}
    else showToastOverlay(`Wrong password — ${attempts} left`,'error');
    render();
  }
}

function showToastOverlay(msg,type){
  const area=document.getElementById('toastArea');
  if(!area)return;
  const t=document.createElement('div');
  t.className='toast'+(type==='error'?' error-toast':'');
  t.innerHTML=`<i class="ti ${type==='error'?'ti-x':'ti-check'}" aria-hidden="true"></i> ${msg}`;
  area.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

function toggleVis(id){
  visible[id]=!visible[id];
  const span=document.getElementById('pwd-'+id);
  const e=entries.find(x=>x.id===id);
  if(!span||!e)return;
  span.textContent=visible[id]?e.pwd:'••••••••';
  span.nextElementSibling.querySelector('i').className='ti '+(visible[id]?'ti-eye-off':'ti-eye');
}

function filterTable(q){
  const filtered=q?entries.filter(e=>e.site.toLowerCase().includes(q.toLowerCase())||e.url.toLowerCase().includes(q.toLowerCase())):entries;
  const tb=document.getElementById('tableBody');
  if(tb)tb.innerHTML=tableHTML(filtered);
}

function openEdit(id){
  editId=id;modalMode='edit';
  render();
}

function closeModal(){modalMode=null;render();}
function closeModalOutside(e){if(e.target.id==='modalOverlay')closeModal();}

function saveEdit(){
  const s=document.getElementById('mSite').value.trim();
  const u=document.getElementById('mUser').value.trim();
  const p=document.getElementById('mPwd').value.trim();
  const idx=entries.findIndex(x=>x.id===editId);
  if(idx!==-1){
    if(s)entries[idx].site=s;
    if(u)entries[idx].user=u;
    if(p){entries[idx].pwd=p;entries[idx].strength=getStrength(p);}
    entries[idx].letter=entries[idx].site[0].toUpperCase();
  }
  modalMode=null;render();showToastOverlay('Entry updated');
}

function deleteEntry(id){
  entries=entries.filter(e=>e.id!==id);
  delete visible[id];
  render();showToastOverlay('Entry deleted');
}

function addEntry(){
  const site=document.getElementById('newSite').value.trim();
  const url=document.getElementById('newUrl').value.trim();
  const user=document.getElementById('newUser').value.trim();
  const pwd=document.getElementById('newPwd').value.trim();
  if(!site||!user||!pwd){showToastOverlay('All fields required','error');return;}
  const id=Date.now();
  const colors=['#00d4ff','#7c3aed','#00ff88','#ffaa00','#ff6b6b'];
  const color=colors[entries.length%colors.length];
  entries.push({id,site,url:url||site.toLowerCase()+'.com',user,pwd,strength:getStrength(pwd),color,letter:site[0].toUpperCase()});
  activeNav='vault';render();showToastOverlay('Password saved to vault');
}

function updateStrengthMeter(val){
  const strength=getStrength(val);
  const count=strength==='Weak'?1:strength==='Medium'?3:5;
  const color=strength==='Weak'?'var(--vault-red)':strength==='Medium'?'var(--vault-amber)':'var(--vault-green)';
  for(let i=1;i<=5;i++){
    const b=document.getElementById('sm'+i);
    if(b)b.style.background=i<=count?color:'var(--vault-border)';
  }
}

function runEnc(val){
  const enc=document.getElementById('encOut');
  const dec=document.getElementById('decOut');
  if(enc)enc.textContent=val?caesar(val,7):'—';
  if(dec){const e=caesar(val,7);dec.textContent=e?caesar(e,-7+94):'—';}
}

render();
</script>
